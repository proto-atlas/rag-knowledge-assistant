name: 品質ゲート

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: 検証
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    timeout-minutes: 20

    steps:
      - name: チェックアウト
        # actions/checkout v6 の公式tagを2026-05-03に確認してpinしています。
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: pnpmを準備
        # pnpm/action-setup v6 の公式annotated tagを2026-05-03にdereferenceしてpinしています。
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a
        with:
          version: 10
          run_install: false

      - name: Node.jsを準備
        # actions/setup-node v6 の公式tagを2026-05-03に確認してpinしています。
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: 依存関係をインストール
        run: pnpm install --frozen-lockfile

      - name: 変更範囲を確認
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$GITHUB_SHA")"
          if [ -z "$changed_files" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$changed_files" | grep -Ev '^(README\.md|docs/.*|LICENSE)$' >/dev/null; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 型チェック
        run: pnpm run typecheck

      - name: lint
        run: pnpm run lint

      - name: unit test
        run: pnpm run test

      - name: build
        run: pnpm run build

      - name: Worker dry-run build
        run: pnpm run build:worker

      - name: E2E
        if: steps.changes.outputs.run_e2e == 'true'
        run: pnpm run test:e2e

      - name: E2E失敗時の証跡を保存
        if: failure() && steps.changes.outputs.run_e2e == 'true'
        # actions/upload-artifact v4 の公式tagを2026-05-03に確認してpinしています。
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
